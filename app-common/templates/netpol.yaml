# This file creates a network policy for the application, if requested
# Refer to `.netpol` in `values.yaml`

{{- if .Values.netpol.enabled -}}
---
apiVersion: networking.k8s.io/v1
metadata:
  name: {{ include "metadata.releaseName" . }}
  labels:
    {{- include "metadata.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "metadata.selectorLabels" . | nindent 6 }}
  policyTypes:
    {{- if .Values.netpol.ingress }}
    - Ingress
    {{- end }}
    {{- if .Values.netpol.egress }}
    - Egress
    {{- end }}
  {{- with .Values.netpol.ingress }} 
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.netpol.egress }} 
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end -}}
