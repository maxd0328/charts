# =======================================================================================================
# This file serves as the default values file for the GitOps chart, as well a template for creating new
# GitOps environments using this chart
# =======================================================================================================

# -------------------------------------------------------------------------------------------------------
# Meta-configuration for customizing this chart
global:
  # Which namespace to deploy generated GitOps resources into (e.g. ArgoCD Applications)
  gitopsNamespace: ''

  # Prefix for names of GitOps resources generated by this chart, default is release name
  prefix: ''

  # Apply no prefix to GitOps resource names at all
  noPrefix: false

  # The default Helm chart for all apps which are deployed by this chart
  commonChart:
    repoURL: ''   # Repository URL
    version: ''   # Target revision

    # Use one of the two following attributes:
    # path: ''    # The path of the chart within the repository
    # name: ''    # The name of the chart within the repository

# =======================================================================================================
# Base configuration - This defines the set of resources to be deployed by this chart
base: {}
  # example-argocd-application: |
    # GitOps-Chart/resource-type: argocd-application
    # namespace: ''               # Namespace for the release, default is this chart's release namespace
    # chart:                      # Override the common chart and use a specific chart for this application
      # repoURL: ''
      # version: ''
      # path: ''
      # name: ''
    # values: {}                  # Helm chart values

  # example-kubernetes-resource: |
    # apiVersion: v1
    # kind: Namespace
    # metadata:
      # name: example-extra

# =======================================================================================================
# Environment configuration - This specifies environment-specific config and overrides

# -------------------------------------------------------------------------------------------------------
# Overlays - Patch any of the resources in the base configuration
overlays: {}
  # example-argocd-application:
  #   chart:
  #     version: ''

  # example-kubernetes-resource:
  #   metadata:
  #     name: alternative-name

  # Disable resources from the base configuration:
  # example-kubernetes-resource: disable

# -----------------------------------------------------------------------------------------------------
# Environment configuration - Any attributes here will be available for use in templates in the base
# configuration, under the key `.config`
config: {}

# -----------------------------------------------------------------------------------------------------
# Any additional manifests specified here will be deployed
inline: []
